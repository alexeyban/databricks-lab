resources:
  jobs:
    orders_ingest_job:
      name: Orders ingest job
      email_notifications:
        no_alert_for_skipped_runs: false
      timeout_seconds: 0
      schedule:
        quartz_cron_expression: 56 4/5 * * * ?
        timezone_id: Europe/Belgrade
        pause_status: PAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: Ingest_to_Bronze
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/bronze/NB_ingest_to_bronze
            base_parameters:
              KAFKA_BOOTSTRAP: 5.tcp.eu.ngrok.io:17430
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          environment_key: Default
        - task_key: ingest_To_Silver
          depends_on:
            - task_key: Ingest_to_Bronze
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/silver/NB_process_to_silver
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
      git_source:
        git_url: https://github.com/alexeyban/databricks-lab
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED
