resources:
  jobs:
    orders_ingest_job:
      name: Orders ingest job
      email_notifications:
        no_alert_for_skipped_runs: false
      timeout_seconds: 0
      schedule:
        quartz_cron_expression: 56 4/5 * * * ?
        timezone_id: Europe/Belgrade
        pause_status: PAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: Ingest_to_Bronze
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/bronze/NB_ingest_to_bronze
            base_parameters:
              KAFKA_BOOTSTRAP: 5.tcp.eu.ngrok.io:17430
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          environment_key: Default
        - task_key: silver_products_generic
          depends_on:
            - task_key: Ingest_to_Bronze
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/silver/NB_process_to_silver_generic
            base_parameters:
              TABLE_ID: products
              RUN_BOOTSTRAP_HOOKS: "false"
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          environment_key: Default
        - task_key: silver_orders_generic
          depends_on:
            - task_key: Ingest_to_Bronze
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/silver/NB_process_to_silver_generic
            base_parameters:
              TABLE_ID: orders
              RUN_BOOTSTRAP_HOOKS: "false"
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          environment_key: Default
        - task_key: gold_dbt_build
          depends_on:
            - task_key: silver_products_generic
            - task_key: silver_orders_generic
          run_if: ALL_SUCCESS
          dbt_task:
            source: WORKSPACE
            project_directory: /Users/alexeyban@gmail.com/opncodetest/cdc_gold
            warehouse_id: 53165753164ae80e
            catalog: workspace
            schema: gold
            commands:
              - dbt build --select total_products_order
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          environment_key: Default
      git_source:
        git_url: https://github.com/alexeyban/databricks-lab
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
            dependencies:
              - dbt-core>=1.0.0,<2.0.0
              - dbt-databricks>=1.0.0,<2.0.0
      performance_target: PERFORMANCE_OPTIMIZED
