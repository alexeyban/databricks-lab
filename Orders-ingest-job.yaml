resources:
  jobs:
    dvdrental_ingest_job:
      name: dvdrental ingest job
      email_notifications:
        no_alert_for_skipped_runs: false
      timeout_seconds: 0
      schedule:
        quartz_cron_expression: 56 4/5 * * * ?
        timezone_id: Europe/Belgrade
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      tasks:
        - task_key: Ingest_to_Bronze
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/bronze/NB_ingest_to_bronze
            base_parameters:
              KAFKA_BOOTSTRAP: localhost:9093  # override at run time via notebook_params
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
          environment_key: Default
        - task_key: ingest_Rental_To_Silver
          depends_on:
            - task_key: Ingest_to_Bronze
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/silver/NB_process_to_silver
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
        - task_key: ingest_Film_To_Silver
          depends_on:
            - task_key: Ingest_to_Bronze
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/silver/NB_process_products_silver
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
        - task_key: ingest_Payment_To_Silver
          depends_on:
            - task_key: Ingest_to_Bronze
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/silver/NB_process_payment_silver
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
        - task_key: vault_Ingest_Hubs
          depends_on:
            - task_key: ingest_Rental_To_Silver
            - task_key: ingest_Film_To_Silver
            - task_key: ingest_Payment_To_Silver
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/vault/NB_ingest_to_hubs
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
        - task_key: vault_Ingest_Links
          depends_on:
            - task_key: vault_Ingest_Hubs
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/vault/NB_ingest_to_links
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
        - task_key: vault_Ingest_Satellites
          depends_on:
            - task_key: vault_Ingest_Hubs
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/vault/NB_ingest_to_satellites
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
        - task_key: vault_Business_Vault
          depends_on:
            - task_key: vault_Ingest_Links
            - task_key: vault_Ingest_Satellites
          run_if: ALL_SUCCESS
          notebook_task:
            notebook_path: notebooks/vault/NB_dv_business_vault
            source: GIT
          timeout_seconds: 0
          email_notifications: {}
          webhook_notifications: {}
      git_source:
        git_url: https://github.com/alexeyban/databricks-lab
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED
