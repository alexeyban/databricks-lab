services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:${KAFKA_EXTERNAL_PORT:-9093}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092

  postgres:
    image: debezium/postgres:15
    ports:
      - "${PGPORT_HOST:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dvdrental
    volumes:
      - ./docker/init-dvdrental.sh:/docker-entrypoint-initdb.d/init.sh
      - ${DVDRENTAL_SQL_PATH:-./docker/dvdrental.sql}:/tmp/dvdrental.sql
      - ./docker/data:/tmp/data
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10

  connect:
    image: debezium/connect:2.5
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

  kafka-ui:
    image: provectuslabs/kafka-ui
    ports:
      - "8085:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # Runs the full dbt Gold layer against Databricks:
  #   dbt deps → dbt debug → dbt build → dbt test
  # Requires DATABRICKS_HOST, DATABRICKS_TOKEN, DATABRICKS_WAREHOUSE_ID in .env.
  #
  # Run:
  #   docker compose --profile dbt-gold run --rm dbt-gold
  dbt-gold:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-dbt.txt
        INSTALL_GIT: "true"
    profiles:
      - dbt-gold
    env_file: .env
    command: bash docker/entrypoint-dbt-gold.sh

  # Generates CDC traffic: film UPDATEs (load_products_generator) + rental/payment
  # INSERTs/UPDATEs (load_generator) running in parallel against the postgres service.
  # Both generators are infinite loops by default; set ITERATIONS to bound them.
  #
  # Start alongside the main stack:
  #   docker compose --profile generate-cdc-traffic up -d generate-cdc-traffic
  # Stop:
  #   docker compose --profile generate-cdc-traffic stop generate-cdc-traffic
  generate-cdc-traffic:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - generate-cdc-traffic
    depends_on:
      - postgres
    env_file: .env
    environment:
      # PGHOST overrides .env: "postgres" is the Docker service name, not localhost
      - PGHOST=postgres
      # Passed through only when set on the host — empty vars would break
      # env_float/env_int in the generator scripts (float("") raises ValueError).
      - ITERATIONS
      - SLEEP_MIN
      - SLEEP_MAX
    command: bash docker/entrypoint-generate-cdc-traffic.sh
    restart: unless-stopped

  # Pushes secrets to Databricks scope 'dvdrental' and deploys all pipeline jobs.
  # Run once after filling in .env, and again whenever jobs or credentials change:
  #   docker compose --profile deploy-databricks-jobs run --rm deploy-databricks-jobs
  # Override DEPLOY_ARGS in .env to pass flags to deploy_job.py, e.g.:
  #   DEPLOY_ARGS=--checkpoint-suffix v2 --run
  deploy-databricks-jobs:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - deploy-databricks-jobs
    env_file: .env
    volumes:
      # push_secrets_to_databricks.py reads .env directly via dotenv_values(".env")
      - ./.env:/app/.env:ro
    command: >
      bash -c "python3 scripts/push_secrets_to_databricks.py &&
               python3 scripts/deploy_job.py $${DEPLOY_ARGS}"

  # Uploads pipeline_configs/datavault/dv_model.json to the Unity Catalog Volume.
  # Run once before the first vault job (or after any dv_model.json change):
  #   docker compose --profile upload-vault-config run --rm upload-vault-config
  upload-vault-config:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - upload-vault-config
    env_file: .env
    command: python3 scripts/upload_vault_config.py

  # Optional: local consumer that uploads CDC events to the Databricks Volume
  # landing zone so the Bronze notebook can use Auto Loader instead of direct
  # Kafka connectivity (no ngrok TCP tunnel required).
  #
  # Start with:
  #   docker compose --profile kafka-to-volume up -d kafka-to-volume
  kafka-to-volume:
    image: python:3.11-slim
    profiles:
      - kafka-to-volume
    depends_on:
      - kafka
      - connect
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DATABRICKS_HOST: ${DATABRICKS_HOST}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN}
    volumes:
      - ./scripts:/app/scripts:ro
    working_dir: /app
    command: >
      bash -c "pip install --quiet confluent-kafka databricks-sdk &&
               python scripts/kafka_to_volume.py --bootstrap kafka:9092"
    restart: unless-stopped
