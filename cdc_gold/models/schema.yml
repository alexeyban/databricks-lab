version: 2

models:
  - name: gold_orders
    description: Current-state Gold orders mart built from the Silver CDC table.
    columns:
      - name: id
        tests:
          - not_null
          - unique
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('gold_products')
              field: id
      - name: product_name
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: price_band
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: last_updated_dt
        tests:
          - not_null
