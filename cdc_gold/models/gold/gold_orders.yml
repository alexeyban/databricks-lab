version: 2

models:
  - name: gold_orders
    description: Current-state Gold orders mart built from the Silver CDC table with product denormalization.
    columns:
      - name: id
        description: Unique order identifier
        tests:
          - not_null
          - unique
      - name: product_id
        description: Foreign key reference to the products table
        tests:
          - not_null
          - relationships:
              to: ref('gold_products')
              field: id
      - name: product_name
        description: Denormalized product name from products table
        tests:
          - not_null
      - name: price
        description: Order price in decimal format
        tests:
          - not_null
      - name: price_band
        description: Price categorization (low, medium, high)
        tests:
          - not_null
      - name: order_date
        description: Date when the order was created
        tests:
          - not_null
      - name: last_updated_dt
        description: Timestamp of the last update to this record
        tests:
          - not_null

  - name: gold_products
    description: Current-state Gold products mart built from the Silver CDC table.
    columns:
      - name: id
        description: Unique product identifier
        tests:
          - not_null
          - unique
      - name: product_name
        description: Name of the product
        tests:
          - not_null
      - name: weight
        description: Product weight
        tests:
          - not_null
      - name: color
        description: Product color
        tests:
          - not_null
      - name: weight_class
        description: Weight categorization (light, medium, heavy)
        tests:
          - not_null
      - name: updated_at
        description: Timestamp of the last update to this product
        tests:
          - not_null
